<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>
  <!-- Livre de comptabilité fermé -->
  <rect x="8" y="10" width="34" height="44" rx="3" fill="url(#cc1)"/>
  <!-- Tranche du livre -->
  <rect x="8" y="10" width="5" height="44" rx="2" fill="#0D9488"/>
  <!-- Page intérieure blanche -->
  <rect x="16" y="16" width="22" height="32" rx="1" fill="#F0FDFA"/>
  <!-- Colonnes de comptabilité -->
  <rect x="18" y="18" width="8" height="1.5" rx="0.75" fill="#0F766E" opacity="0.8"/>
  <rect x="28" y="18" width="8" height="1.5" rx="0.75" fill="#0F766E" opacity="0.8"/>
  <!-- Séparateur colonne -->
  <line x1="27" y1="18" x2="27" y2="46" stroke="#0F766E" stroke-width="0.8" opacity="0.4"/>
  <!-- Lignes de données -->
  <rect x="18" y="22" width="7" height="1.2" rx="0.6" fill="#14B8A6" opacity="0.7"/>
  <rect x="29" y="22" width="7" height="1.2" rx="0.6" fill="#14B8A6" opacity="0.7"/>
  <rect x="18" y="25" width="7" height="1.2" rx="0.6" fill="#0F766E" opacity="0.5"/>
  <rect x="29" y="25" width="7" height="1.2" rx="0.6" fill="#0F766E" opacity="0.5"/>
  <rect x="18" y="28" width="7" height="1.2" rx="0.6" fill="#14B8A6" opacity="0.7"/>
  <rect x="29" y="28" width="7" height="1.2" rx="0.6" fill="#14B8A6" opacity="0.7"/>
  <rect x="18" y="31" width="7" height="1.2" rx="0.6" fill="#0F766E" opacity="0.5"/>
  <rect x="29" y="31" width="7" height="1.2" rx="0.6" fill="#0F766E" opacity="0.5"/>
  <!-- Ligne de total -->
  <rect x="18" y="36" width="18" height="0.8" rx="0.4" fill="#0F766E"/>
  <rect x="18" y="39" width="7" height="1.5" rx="0.75" fill="#0F766E" opacity="0.9"/>
  <rect x="29" y="39" width="7" height="1.5" rx="0.75" fill="#0F766E" opacity="0.9"/>
  <!-- Symbole € (comptabilité) -->
  <circle cx="50" cy="22" r="8" fill="url(#cc2)"/>
  <text x="50" y="26" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial">€</text>
</svg>
