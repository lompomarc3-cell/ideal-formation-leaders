      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Sol / champ -->
  <rect x="4" y="44" width="56" height="16" rx="4" fill="url(#gr1)"/>
