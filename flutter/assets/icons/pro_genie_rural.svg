  <ellipse cx="47" cy="11" rx="6" ry="4" fill="#0369A1" transform="rotate(-30 47 11)"/>
  <!-- Engrenage (ingénierie) -->
  <circle cx="32" cy="36" r="4" fill="white" opacity="0.9"/>
  <line x1="32" y1="28" x2="32" y2="44" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="24" y1="36" x2="40" y2="36" stroke="white" stroke-width="2" opacity="0.7"/>
