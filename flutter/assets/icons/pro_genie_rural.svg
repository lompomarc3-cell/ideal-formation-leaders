  <line x1="20" y1="44" x2="20" y2="20" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="20" cy="17" rx="4" ry="7" fill="#FBBF24"/>
  <ellipse cx="16" cy="22" rx="3" ry="6" fill="#FBBF24" transform="rotate(-20 16 22)"/>
  <ellipse cx="24" cy="22" rx="3" ry="6" fill="#FBBF24" transform="rotate(20 24 22)"/>
  <!-- Outil / pelle -->
